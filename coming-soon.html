<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merkert Social Media – Bald verfügbar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#F5F0E8;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
.card{max-width:480px}
.eyebrow{font-family:sans-serif;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#C67B5A;margin-bottom:1.25rem}
h1{font-size:2.4rem;font-weight:normal;color:#2C2420;line-height:1.25;margin-bottom:1.25rem}
h1 em{color:#C67B5A;font-style:italic}
p{font-family:sans-serif;font-size:15px;color:#8B6F5A;line-height:1.8;margin-bottom:2rem}
.badge{display:inline-block;background:#4A6741;color:white;font-family:sans-serif;font-size:13px;padding:10px 24px;border-radius:4px}
.dot{display:inline-block;width:8px;height:8px;background:#C67B5A;border-radius:50%;margin-right:8px;animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">Merkert Social Media</div>
  <h1>Dein Content-Shop<br>kommt <em>bald.</em></h1>
  <p>Personalisierte Social-Media-Posts für Vermögensberater – fertig in wenigen Minuten. Ich arbeite gerade am letzten Schliff.</p>
  <div class="badge"><span class="dot"></span>In Kürze verfügbar</div>
</div>
</body>
</html>
