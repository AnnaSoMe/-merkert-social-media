[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm install && npm install --platform=linux --arch=x64 sharp"

[build.environment]
  BASE_URL    = "https://merkertsocialmedia.com"
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# WARTUNGSMODUS – alle Seiten auf coming-soon umleiten
[[redirects]]
  from = "/*"
  to = "/coming-soon.html"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Stripe-Webhook braucht den raw body (kein JSON-Parsing durch Netlify)
[[headers]]
  for = "/.netlify/functions/stripe-webhook"
  [headers.values]
    Content-Type = "application/json"
